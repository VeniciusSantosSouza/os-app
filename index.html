<!DOCTYPE html>
<html lang="pt-br">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Abertura de OS</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">

  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: "Poppins", "Segoe UI", Arial, sans-serif;
      padding: 16px;
      background: linear-gradient(180deg, #f0f5ff 0%, #e8f1ff 100%);
      color: #0f172a;
    }

    h3 {
      margin: 0 0 14px;
      font-size: 1.35rem;
      font-weight: 700;
      letter-spacing: 0.2px;
    }

    #form,
    .resultado {
      background: #fff;
      border: 1px solid #dbe7fb;
      border-radius: 14px;
      padding: 16px;
      box-shadow: 0 10px 30px rgba(15, 23, 42, 0.08);
    }

    #form {
      margin-bottom: 14px;
    }

    label {
      display: block;
      margin: 12px 0 6px;
      font-size: 0.86rem;
      font-weight: 600;
      color: #334155;
    }

    input,
    textarea {
      width: 100%;
      padding: 12px 13px;
      margin: 0;
      border: 1px solid #c8d6f0;
      border-radius: 12px;
      font-size: 15px;
      font-family: inherit;
      color: #0f172a;
      background: #f8fbff;
      outline: none;
      transition: border-color .2s ease, box-shadow .2s ease, background-color .2s ease;
      -webkit-appearance: none;
      appearance: none;
    }

    input::placeholder,
    textarea::placeholder {
      color: #94a3b8;
    }

    textarea {
      min-height: 88px;
      resize: vertical;
    }

    input:focus,
    textarea:focus {
      border-color: #2563eb;
      box-shadow: 0 0 0 4px rgba(37, 99, 235, 0.16);
      background: #fff;
    }

    .resultado {
      background: #f8fbff;
      border-left: 4px solid #2563eb;
    }

    .resultado p {
      margin: 0 0 11px;
      display: flex;
      gap: 6px;
      align-items: baseline;
      line-height: 1.35;
    }

    .resultado p:last-child {
      margin-bottom: 0;
    }

    button {
      padding: 13px 16px;
      width: 100%;
      margin-top: 14px;
      border: none;
      border-radius: 12px;
      background: linear-gradient(135deg, #16a34a 0%, #15803d 100%);
      color: #fff;
      font-weight: 700;
      font-family: inherit;
      font-size: 0.98rem;
      cursor: pointer;
      box-shadow: 0 8px 18px rgba(22, 163, 74, 0.25);
      transition: transform .15s ease, box-shadow .2s ease, filter .2s ease;
    }

    button:hover {
      filter: brightness(1.04);
      transform: translateY(-1px);
    }

    button:active {
      transform: translateY(0);
    }

    button:focus-visible {
      outline: none;
      box-shadow: 0 0 0 4px rgba(21, 128, 61, 0.25);
    }

    .acoes {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin-top: 14px;
    }

    .acoes button {
      margin-top: 0;
    }

    .btn-limpar {
      background: linear-gradient(135deg, #64748b 0%, #475569 100%);
      box-shadow: 0 8px 18px rgba(71, 85, 105, 0.22);
    }

    .btn-limpar:focus-visible {
      box-shadow: 0 0 0 4px rgba(71, 85, 105, 0.25);
    }

    @media (min-width: 900px) {
      body {
        max-width: 780px;
        margin: 0 auto;
        padding: 28px 20px;
      }
    }
  </style>
</head>

<body>

  <h3>Abertura de OS</h3>

  <form id="form" onsubmit="return false;">
    <label for="id_matricula">Matrícula</label>
    <input id="id_matricula" inputmode="numeric" pattern="[0-9]*" placeholder="Ex: 123456">

    <label for="id_frota">Frota</label>
    <input id="id_frota" inputmode="numeric" pattern="[0-9]*" placeholder="Ex: 7890">

    <label for="id_data_abertura">Data e Hora</label>
    <input id="id_data_abertura" placeholder="Ex: 16/04/2026 14:30">

    <label for="id_motivo">Motivo</label>
    <textarea id="id_motivo" placeholder="Ex: Falha no sistema de freio"></textarea>

    <label for="id_km">KM</label>
    <input id="id_km" inputmode="numeric" pattern="[0-9]*" placeholder="Ex: 245678">

    <label for="id_local">Local</label>
    <input id="id_local" placeholder="Ex: BR-101, Km 210">

    <label for="id_acoplado_1">Acoplado 1</label>
    <input id="id_acoplado_1" placeholder="Ex: ABC1D23">

    <label for="id_acoplado_2">Acoplado 2</label>
    <input id="id_acoplado_2" placeholder="Ex: EFG4H56">

  </form>

  <div class="resultado">
    <p>🆔 <span id="p_matricula">-</span></p>
    <p>🚚 <span id="p_frota">-</span></p>
    <p>⏰ <span id="p_data">-</span></p>
    <p>📝 <span id="p_motivo">-</span></p>
    <p>🛣️ <span id="p_km">-</span></p>
    <p>📍 <span id="p_local">-</span></p>
    <p id="p_acoplado_linha">🔗 <span id="p_acoplado"></span></p>
  </div>

  <div class="acoes">
    <button type="button" onclick="copiar()">Copiar</button>
    <button type="button" class="btn-limpar" onclick="limpar()">Limpar</button>
  </div>

  <script>
    const $ = (id) => document.getElementById(id);

    function val(id) {
      return $(id)?.value?.trim() || "";
    }

    function getData() {
      return {
        matricula: val("id_matricula"),
        frota: val("id_frota"),
        data: val("id_data_abertura"),
        motivo: val("id_motivo"),
        km: val("id_km"),
        local: val("id_local"),
        acoplados: [
          val("id_acoplado_1"),
          val("id_acoplado_2")
        ].filter(Boolean)
      };
    }

    function render() {
      const d = getData();

      $("p_matricula").textContent = d.matricula || "-";
      $("p_frota").textContent = d.frota || "-";
      $("p_data").textContent = d.data || "-";
      $("p_motivo").textContent = d.motivo || "-";
      $("p_km").textContent = d.km || "-";
      $("p_local").textContent = d.local || "-";

      const ac = d.acoplados.join(" / ");
      const linha = $("p_acoplado_linha");
      const span = $("p_acoplado");

      if (ac.length > 0) {
        span.textContent = ac;
        linha.style.display = "block";
      } else {
        span.textContent = "";
        linha.style.display = "none";
      }
    }

    function dataHoraAtual() {
      const agora = new Date();
      const dd = String(agora.getDate()).padStart(2, "0");
      const mm = String(agora.getMonth() + 1).padStart(2, "0");
      const aaaa = String(agora.getFullYear());
      const hh = String(agora.getHours()).padStart(2, "0");
      const min = String(agora.getMinutes()).padStart(2, "0");
      return `${dd}/${mm}/${aaaa} ${hh}:${min}`;
    }

    function buildMessage() {
      const d = getData();

      return `
📃 ABERTURA DE OS

🆔 MATRÍCULA: ${d.matricula || "-"}

🚚 FROTA: ${d.frota || "-"}

⏰ HORÁRIO: ${d.data || "-"}

📝 MOTIVO: ${d.motivo || "-"}

🛣️ KM: ${d.km || "-"}

📍 LOCAL: ${d.local || "-"}
`.trim();
    }

    async function copyToClipboard(text) {
      try {
        await navigator.clipboard.writeText(text);
      } catch (e) {
        const ta = document.createElement("textarea");
        ta.value = text;
        ta.style.position = "fixed";
        ta.style.opacity = "0";
        document.body.appendChild(ta);
        ta.focus();
        ta.select();
        document.execCommand("copy");
        document.body.removeChild(ta);
      }
    }

    function copiar() {
      requestAnimationFrame(() => {
        copyToClipboard(buildMessage());
      });
    }

    function limpar() {
      document.querySelectorAll("#form input, #form textarea")
        .forEach((el) => {
          el.value = "";
        });
      initDataHoraAtual();
      render();
    }

    function bindInputs() {
      document.querySelectorAll("input, textarea")
        .forEach(el => el.addEventListener("input", render));
    }

    function initDataHoraAtual() {
      const campoData = $("id_data_abertura");
      if (campoData && !campoData.value.trim()) {
        campoData.value = dataHoraAtual();
      }
    }

    window.addEventListener("load", () => {
      bindInputs();
      initDataHoraAtual();
      render();
    });
  </script>

</body>

</html>
